<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <div class="inventry">
            <h1>Inventory Management</h1>
            <form id="productForm">
                <input required type="text" placeholder="Product Name">
                <input required type="text" placeholder="Category">
                <input required type="number" placeholder="Price">
                <input required type="number" placeholder="Quantity">
                <input required type="text" placeholder="Stock">
                <input required type="text" placeholder="Vendor">
                <input required type="date" name="" id="">
                <input required type="submit" value="Add Product" id="submit">
            </form>

            <div class="card-container">
                
            </div>
        </div>

    </main>
    <script src="app.js"></script>
</body>

</html>
